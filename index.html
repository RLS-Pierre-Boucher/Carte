<html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMF — RLS Pierre-Boucher · Cliniques en recrutement</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0f2240">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cliniques PB">
<link rel="apple-touch-icon" href="./apple-touch-icon-180.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --navy: #0f2240; --navy2: #1a3558; --blue: #3b82c4; --blue-lt: #dbeafe;
  --cream: #f8f6f1; --white: #fff; --border: #ddd5c4; --muted: #64748b;
  --orange: #ee2d62; --green: #16a34a;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'Lato', sans-serif; }

/* HEADER */
header {
  position: fixed; top: 0; left: 0; right: 0; height: 62px;
  background: var(--navy); border-bottom: 3px solid var(--orange);
  display: flex; align-items: center; padding: 0 22px; gap: 14px; z-index: 1000;
}
.logo-img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
.logo-text { color: #fff; }
.logo-text strong { font-family: 'Raleway', sans-serif; font-size: 14px; font-weight: 700; display: block; }
.logo-text span { font-size: 11px; font-weight: 300; opacity: .6; letter-spacing: .04em; text-transform: uppercase; }
.header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.btn-install { background: var(--orange); color: #fff; font-family: 'Raleway', sans-serif;
  font-size: 12px; font-weight: 700; padding: 7px 14px; border-radius: 6px; border: none;
  cursor: pointer; letter-spacing: .03em; display: none; white-space: nowrap; }
.btn-install:hover { filter: brightness(1.08); }
.btn-install.show { display: inline-block; }
.ios-tip { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
  background: var(--navy); color: #fff; padding: 12px 16px; border-radius: 10px;
  font-size: 14px; line-height: 1.45; max-width: 92%; box-shadow: 0 6px 24px rgba(0,0,0,.3);
  z-index: 2000; display: none; }
.ios-tip.show { display: block; }
.ios-tip b { color: #ffd76b; }

/* LAYOUT */
.layout { display: flex; height: 100vh; padding-top: 62px; }

/* SIDEBAR */
.sidebar { width: 400px; flex-shrink: 0; background: var(--white);
  border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sb-head { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); background: var(--cream); flex-shrink: 0; }
.sb-head h2 { font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 19px;
  text-transform: uppercase; letter-spacing: .08em; color: var(--navy2); }
.sb-head p { font-size: 13px; color: var(--muted); margin-top: 3px; font-weight: 300; }
.sb-head .maj { font-size: 11px; font-style: italic; margin-top: 6px; opacity: .85; }
.sb-list { overflow-y: auto; flex: 1; }
.sb-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
  border-bottom: 1px solid #f0ece4; cursor: pointer; transition: background .12s; user-select: none; }
.sb-item:hover { background: #f5f2ec; }
.sb-item.active { background: var(--blue-lt); border-left: 3px solid var(--blue); }
.sb-item.dragging { opacity: .4; }
.sb-item.drag-over { border-top: 2px solid var(--orange); }
.sb-grip { color: #c9c1ad; font-size: 16px; cursor: grab; flex-shrink: 0; line-height: 1; }
.sb-item:active .sb-grip { cursor: grabbing; }
.sb-num { width: 30px; height: 30px; border-radius: 50%; background: var(--navy2); color: #fff;
  font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 14px; line-height: 1; text-align: center;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sb-item.active .sb-num { background: var(--orange); }
.sb-info { flex: 1; min-width: 0; }
.sb-name { font-family: 'Raleway', sans-serif; font-weight: 600; font-size: 17px;
  color: var(--navy2); white-space: normal; overflow: visible; }
.sb-city { font-size: 15px; color: var(--muted); margin-top: 2px; }

/* MAP */
#map { flex: 1; cursor: default; }
.leaflet-control-attribution.author-credit { font-size: 10px; color: var(--muted);
  background: rgba(255,255,255,.8); padding: 2px 6px; }

/* MARKER NUMBER */
.pin-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  transform: rotate(45deg); color: #fff; font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 11px; }

/* DETAIL PANEL (READ-ONLY VIEWER) */
.detail { position: fixed; top: 62px; right: 0; bottom: 0; width: 480px;
  background: var(--white); border-left: 1px solid var(--border);
  box-shadow: -6px 0 30px rgba(0,0,0,.1); z-index: 960;
  display: flex; flex-direction: column; overflow: hidden;
  transform: translateX(100%); transition: transform .35s cubic-bezier(.4,0,.2,1); }
.detail.open { transform: translateX(0); }
.dp-head { background: var(--navy); color: #fff; padding: 14px 18px;
  flex-shrink: 0; border-bottom: 3px solid var(--orange); position: relative; }
.dp-close { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2); border-radius: 6px; width: 26px; height: 26px;
  color: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.dp-tag { font-family:'Raleway',sans-serif; font-size:11px; font-weight:700; letter-spacing:.1em;
  text-transform:uppercase; color:var(--orange); margin-bottom:4px; }
.dp-name-display { font-family:'Raleway',sans-serif; font-weight:800; font-size:18px; line-height:1.2; padding-right: 30px; }
.dp-coords { font-size:11px; color:rgba(255,255,255,.5); margin-top:4px; font-style:italic; }
.dp-body { flex:1; overflow-y:auto; padding: 0 0 20px; }

/* DISPLAY SECTIONS */
.vw-sec { padding: 14px 18px 0; }
.vw-sec-title { font-family:'Raleway',sans-serif; font-weight:700; font-size:13px;
  text-transform:uppercase; letter-spacing:.1em; color:var(--blue);
  border-bottom:1px solid var(--border); padding-bottom:5px; margin-bottom:10px; }
.vw-row { display:flex; gap:10px; margin-bottom:9px; align-items:baseline; }
.vw-label { font-size:13px; color:var(--muted); min-width:120px; flex-shrink:0; }
.vw-value { flex:1; font-size:14.5px; color:var(--navy2); word-break: break-word; }
.vw-value a { color: var(--blue); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .15s; }
.vw-value a:hover { border-bottom-color: var(--blue); }
.vw-divider { height:1px; background:var(--border); margin:14px 18px 0; }

/* Horaire grid */
.hor-grid { display:grid; grid-template-columns:auto 1fr; gap:4px 14px; }
.hor-day { font-size:14px; color:var(--muted); }
.hor-val { font-size:14px; color:var(--navy2); font-weight:600; }
.hor-val.ferme { color:#b8b1a0; font-weight:400; }

/* Staff grid */
.staff-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
.staff-cell { background:var(--cream); border:1px solid var(--border); border-radius:8px;
  padding:8px 10px; display:flex; align-items:center; gap:8px; }
.staff-icon { font-size:16px; }
.staff-count { font-family:'Raleway',sans-serif; font-weight:700; font-size:15px; color:var(--navy2); min-width:22px; }
.staff-count.empty { color:#c9c1ad; }
.staff-label { font-size:13px; color:var(--muted); line-height:1.3; }

/* NOTES (editable + saved locally) */
.notes-sec { padding: 14px 18px 0; }
.notes-textarea { width:100%; border:1px solid var(--border); border-radius:8px;
  padding:8px 10px; font-size:14px; font-family:'Lato',sans-serif; background:var(--cream);
  resize:vertical; min-height:90px; line-height:1.5; }
.notes-textarea:focus { outline:none; border-color:var(--blue); background:#fff; }

/* Save bar */
.save-bar { padding:12px 18px; background:var(--cream); border-top:1px solid var(--border);
  display:flex; gap:10px; align-items:center; flex-shrink:0; }
.btn-save { flex:1; background:var(--blue); color:#fff; border:none; border-radius:7px;
  padding:10px; font-size:12px; font-family:'Raleway',sans-serif; font-weight:700; letter-spacing:.04em;
  cursor:pointer; }
.btn-save:hover { background:#2b6caa; }
.save-msg { font-size:12px; color:var(--green); display:none; align-items:center; gap:4px; white-space:nowrap; }
.save-msg.show { display:flex; }

/* scrollbar */
.dp-body::-webkit-scrollbar, .sb-list::-webkit-scrollbar { width:4px; }
.dp-body::-webkit-scrollbar-thumb, .sb-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.sidebar-toggle {
  display: none;
  position: fixed; left: 0; top: 50%; transform: translateY(-50%);
  z-index: 940; background: var(--navy); color: #fff;
  border: none; border-left: 3px solid var(--orange);
  border-radius: 0 12px 12px 0; padding: 18px 8px; cursor: pointer;
  writing-mode: vertical-rl; font-family: 'Raleway', sans-serif;
  font-weight: 700; font-size: 13px; letter-spacing: .12em; text-transform: uppercase;
  box-shadow: 2px 0 12px rgba(0,0,0,.25);
}
.sidebar-toggle:hover { background: var(--navy2); }
.sidebar-toggle.hidden { display: none !important; }
.sidebar-overlay {
  display: none; position: fixed; inset: 62px 0 0 0;
  background: rgba(15,34,64,.4); z-index: 945;
  opacity: 0; pointer-events: none; transition: opacity .3s;
}
.sidebar-overlay.show { opacity: 1; pointer-events: auto; }

@media (max-width: 860px) {
  .detail { width: 100%; }
  .sidebar {
    display: flex; position: fixed; top: 62px; left: 0; bottom: 0;
    width: 86%; max-width: 360px; z-index: 950;
    transform: translateX(-100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    box-shadow: 4px 0 24px rgba(0,0,0,.28);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-toggle { display: block; }
  .sidebar-overlay { display: block; }
}
</style>
</head>

    <div class="dp-coords" id="dp-coords"></div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ═══════════════════════════════════════════
//  DONNÉES
// ═══════════════════════════════════════════
let gmfs = [];
let order = [];
let dataMeta = {};

// ── Stockage local (notes personnelles + ordre du classement) ──
const SAFE = {
  get(k){ try { return localStorage.getItem(k); } catch(e){ return null; } },
  set(k,v){ try { localStorage.setItem(k,v); return true; } catch(e){ return false; } }
};
const NOTE_KEY  = id => 'gmf-pb-note-' + id;
const ORDER_KEY = 'gmf-pb-ordre';

// (notes, ordre et marqueurs sont initialisés dans initData(), après le chargement de data.json)

const byId = id => gmfs.find(g => g.id === id);
const rankOf = id => order.indexOf(id) + 1;

// ═══════════════════════════════════════════
//  CARTE
// ═══════════════════════════════════════════
const HOME = { center:[45.62,-73.44], zoom:11 };
const map = L.map('map', { center:HOME.center, zoom:HOME.zoom, zoomControl:false });
L.control.zoom({ position:'topright' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap © CartoDB', maxZoom:19
}).addTo(map);

// Crédit auteur en bas à gauche, à côté de Leaflet / OpenStreetMap
const credit = L.control({ position:'bottomleft' });
credit.onAdd = function(){
  const d = L.DomUtil.create('div', 'leaflet-control-attribution author-credit');
  d.innerHTML = 'Olivier Laplante';
  return d;
};
credit.addTo(map);

let activeId = null;
const markers = {};

function makeIcon(active, rank) {
  const c = active ? '#ee2d62' : '#0f2240';
  return L.divIcon({ className:'',
    html:`<div style="position:relative;width:20px;height:20px;background:${c};border:2.5px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,.3)"><span class="pin-num">${rank}</span></div>`,
    iconSize:[20,20], iconAnchor:[10,20], popupAnchor:[0,-22] });
}

function refreshMarkerIcons() {
  gmfs.forEach(g => markers[g.id].setIcon(makeIcon(g.id === activeId, rankOf(g.id))));
}

function buildMarkers() {
  gmfs.forEach(g => {
    const m = L.marker([g.lat, g.lng], { icon:makeIcon(false, rankOf(g.id)), draggable:false }).addTo(map);
    m.bindTooltip(`<b>${g.nom.trim()}</b><br><small>${g.ville}</small>`, { direction:'top', offset:[0,-20] });
    m.on('click', (e) => { L.DomEvent.stopPropagation(e); toggleDetail(g.id); });
    markers[g.id] = m;
  });
}

// Clic sur la carte (fond) → fermer la fiche et revenir à la carte
map.on('click', () => { if (activeId !== null) closeDetail(); });

// ═══════════════════════════════════════════
//  SIDEBAR (liste réordonnable — top 12)
// ═══════════════════════════════════════════
const sbList = document.getElementById('sb-list');
let dragSrcId = null, justDragged = false;

function renderSidebar() {
  sbList.innerHTML = '';
  order.forEach((id, i) => {
    const g = byId(id);
    const parenMatch = g.nom.trim().match(/^(.*?)\s*(\(.*\))\s*$/);
    const nomMain = parenMatch ? parenMatch[1] : g.nom.trim();
    const el = document.createElement('div');
    el.className = 'sb-item' + (id === activeId ? ' active' : '');
    el.id = 'si-' + id;
    el.draggable = true;
    el.innerHTML = `<span class="sb-grip" title="Glisser pour reclasser">⠿</span>
      <div class="sb-num">${i+1}</div>
      <div class="sb-info">
        <div class="sb-name">${nomMain}</div>
        <div class="sb-city">📍 ${g.ville}</div>
      </div>`;

    el.addEventListener('click', () => { if (justDragged) return; toggleDetail(id); });

    el.addEventListener('dragstart', e => {
      dragSrcId = id; el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(id)); // requis par Firefox
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      document.querySelectorAll('.sb-item').forEach(x => x.classList.remove('drag-over'));
      justDragged = true; setTimeout(() => justDragged = false, 60);
    });
    el.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault(); el.classList.remove('drag-over');
      if (dragSrcId === null || dragSrcId === id) return;
      order = order.filter(x => x !== dragSrcId);
      const targetIdx = order.indexOf(id);
      order.splice(targetIdx, 0, dragSrcId);
      SAFE.set(ORDER_KEY, JSON.stringify(order));
      renderSidebar();
      refreshMarkerIcons();
    });

    sbList.appendChild(el);
  });
}

// ═══════════════════════════════════════════
//  FICHE (consultation seule + notes éditables)
// ═══════════════════════════════════════════
const staffDefs = [
  {icon:'🩺', key:'medecins',           lbl:'Médecins'},
  {icon:'👩‍⚕️', key:'infirmieres',       lbl:'Infirmières'},
  {icon:'🏥',  key:'ipspl',             lbl:'IPSPL'},
  {icon:'🦵',  key:'physiotherapeutes', lbl:'Physiothérapeutes'},
  {icon:'💊',  key:'pharmaciennes',     lbl:'Pharmaciennes'},
  {icon:'🤝',  key:'travailleuresSociales', lbl:'Travailleuses sociales'},
];

const esc = s => (s == null ? '' : String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'));

function siteLink(url) {
  if (!url) return '—';
  const safe = esc(url);
  const pretty = esc(url.replace(/^https?:\/\//,'').replace(/\/$/,''));
  return `<a href="${safe}" target="_blank" rel="noopener">${pretty}</a>`;
}
function contactLink(c) {
  if (!c) return '—';
  c = c.trim();
  if (/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(c))
    return `<a href="mailto:${esc(c)}">${esc(c)}</a>`;
  return esc(c);
}
function telLink(phone) {
  if (!phone) return '—';
  const digits = phone.replace(/[^\d+]/g, '');
  return `<a href="tel:${digits}">${esc(phone)}</a>`;
}
function mapsLink(g) {
  if (!g.adresse) return '—';
  const query = encodeURIComponent(g.nom.trim() + ', ' + g.adresse);
  const url = 'https://www.google.com/maps/search/?api=1&query=' + query;
  return `<a href="${url}" target="_blank" rel="noopener" title="Ouvrir dans Google Maps">${esc(g.adresse)}</a>`;
}

// Navigation arrière (mobile) + références du tiroir latéral
let detailHistoryActive = false;
let sidebarEl = null, sbToggle = null, sbOverlay = null;

function toggleDetail(id) {
  if (id === activeId) { closeDetail(); }
  else { openDetail(id); }
}

function openDetail(id) {
  const g = byId(id);
  if (!g) return;
  saveNotes(false); // persiste les notes de la fiche précédente avant de changer
  if (activeId !== null && markers[activeId]) markers[activeId].setIcon(makeIcon(false, rankOf(activeId)));
  document.querySelectorAll('.sb-item').forEach(e => e.classList.remove('active'));
  activeId = id;
  markers[id].setIcon(makeIcon(true, rankOf(id)));
  document.getElementById('si-'+id)?.classList.add('active');
  map.flyTo([g.lat, g.lng], 14, { duration:1 });

  // Historique : le bouton "retour" du téléphone revient à la carte sans quitter l'app
  if (!detailHistoryActive) { history.pushState({ gmfDetail: true }, ''); detailHistoryActive = true; }
  else { history.replaceState({ gmfDetail: true }, ''); }
  // Mobile : referme le tiroir et masque l'onglet pendant l'affichage de la fiche
  if (sidebarEl) sidebarEl.classList.remove('open');
  if (sbOverlay) sbOverlay.classList.remove('show');
  if (sbToggle) sbToggle.classList.add('hidden');

  document.getElementById('dp-tag').textContent = g.type + (g.alias ? ' · '+g.alias : '');
  document.getElementById('dp-name-disp').textContent = g.nom.trim();
  document.getElementById('dp-coords').textContent = `📍 ${g.lat.toFixed(6)}, ${g.lng.toFixed(6)}`;

  // Horaire (lecture seule)
  let horRows = '';
  for (const [jour, heure] of Object.entries(g.horaire)) {
    const ferme = /ferm/i.test(heure);
    horRows += `<span class="hor-day">${jour}</span><span class="hor-val${ferme?' ferme':''}">${esc(heure)}</span>`;
  }

  // Personnel (lecture seule)
  let staffCells = '';
  staffDefs.forEach(s => {
    const v = g.personnel[s.key];
    const has = v && String(v).trim() !== '';
    staffCells += `<div class="staff-cell">
      <span class="staff-icon">${s.icon}</span>
      <span class="staff-count${has?'':' empty'}">${has ? esc(v) : '—'}</span>
      <span class="staff-label">${s.lbl}</span>
    </div>`;
  });

  document.getElementById('dp-body').innerHTML = `
    <div class="vw-sec">
      <div class="vw-sec-title">Informations générales</div>
      <div class="vw-row"><span class="vw-label">Type</span><span class="vw-value">${esc(g.type)}</span></div>
      ${g.alias ? `<div class="vw-row"><span class="vw-label">Aussi connu sous</span><span class="vw-value">${esc(g.alias)}</span></div>` : ''}
      <div class="vw-row"><span class="vw-label">Adresse</span><span class="vw-value">${mapsLink(g)}</span></div>
      <div class="vw-row"><span class="vw-label">Ville</span><span class="vw-value">${esc(g.ville)}</span></div>
      <div class="vw-row"><span class="vw-label">Téléphone</span><span class="vw-value">${telLink(g.telephone)}</span></div>
      <div class="vw-row"><span class="vw-label">Site internet</span><span class="vw-value">${siteLink(g.site)}</span></div>
      <div class="vw-row"><span class="vw-label">Contact</span><span class="vw-value">${contactLink(g.personneRessource)}</span></div>
      <div class="vw-row"><span class="vw-label">DMÉ</span><span class="vw-value">${esc(g.dme)}</span></div>
    </div>
    <div class="vw-divider"></div>
    <div class="vw-sec">
      <div class="vw-sec-title">Horaire d'ouverture</div>
      <div class="hor-grid">${horRows}</div>
    </div>
    <div class="vw-divider"></div>
    <div class="vw-sec">
      <div class="vw-sec-title">Personnel clinique</div>
      <div class="staff-grid">${staffCells}</div>
    </div>
    <div class="vw-divider"></div>
    <div class="notes-sec">
      <div class="vw-sec-title">Mes notes</div>
      <textarea class="notes-textarea" id="notes-input" placeholder="Vos notes personnelles sur cette clinique (sauvegardées dans votre navigateur)…">${esc(g.notes || '')}</textarea>
    </div>
    <div style="height:8px"></div>
  `;

  document.getElementById('detail').classList.add('open');

  // Autosauvegarde discrète quand on quitte le champ
  const ta = document.getElementById('notes-input');
  ta.addEventListener('blur', () => saveNotes(false));
}

function saveNotes(flash = true) {
  if (activeId === null) return;
  const g = byId(activeId);
  const ta = document.getElementById('notes-input');
  if (!ta) return;
  g.notes = ta.value;
  SAFE.set(NOTE_KEY(activeId), g.notes);
  if (flash) {
    const msg = document.getElementById('save-msg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2000);
  }
}

function closeDetailUI() {
  saveNotes(false); // persiste les notes avant de fermer
  if (activeId !== null && markers[activeId]) markers[activeId].setIcon(makeIcon(false, rankOf(activeId)));
  activeId = null;
  document.querySelectorAll('.sb-item').forEach(e => e.classList.remove('active'));
  document.getElementById('detail').classList.remove('open');
  if (sbToggle) sbToggle.classList.remove('hidden'); // réaffiche l'onglet Liste (mobile)
  map.flyTo(HOME.center, HOME.zoom, { duration:1 });
}

function closeDetail() {
  // Si une entrée d'historique a été ajoutée à l'ouverture, on "recule" pour rester
  // synchronisé avec le bouton retour du téléphone ; sinon on ferme directement.
  if (detailHistoryActive) { history.back(); }
  else { closeDetailUI(); }
}

// Bouton "retour" du téléphone / navigateur -> revient à la carte (sans quitter l'app)
window.addEventListener('popstate', function () {
  detailHistoryActive = false;
  if (activeId !== null) closeDetailUI();
});

document.getElementById('dp-close').addEventListener('click', closeDetail);
document.getElementById('btn-save-notes').addEventListener('click', () => saveNotes(true));

// Tiroir latéral (mobile)
sidebarEl = document.querySelector('.sidebar');
sbToggle = document.getElementById('sidebar-toggle');
sbOverlay = document.getElementById('sidebar-overlay');
function openDrawer() { sidebarEl.classList.add('open'); sbOverlay.classList.add('show'); sbToggle.classList.add('hidden'); }
function closeDrawer() { sidebarEl.classList.remove('open'); sbOverlay.classList.remove('show'); sbToggle.classList.remove('hidden'); }
if (sbToggle) sbToggle.addEventListener('click', openDrawer);
if (sbOverlay) sbOverlay.addEventListener('click', closeDrawer);

// ═══════════════════════════════════════════
//  CHARGEMENT DES DONNÉES (data.json)
// ═══════════════════════════════════════════
function showUpdateDate() {
  const el = document.getElementById('maj-date');
  if (!el) return;
  if (dataMeta && dataMeta.miseAJour) {
    const d = new Date(dataMeta.miseAJour + 'T00:00:00');
    const fmt = isNaN(d.getTime()) ? dataMeta.miseAJour
      : d.toLocaleDateString('fr-CA', { year:'numeric', month:'long', day:'numeric' });
    el.textContent = 'Données mises à jour le ' + fmt;
  } else {
    el.textContent = '';
  }
}

function initData(data) {
  gmfs = Array.isArray(data) ? data : (data.cliniques || []);
  dataMeta = Array.isArray(data) ? {} : (data || {});

  // Notes personnelles sauvegardées
  gmfs.forEach(g => { const n = SAFE.get(NOTE_KEY(g.id)); if (n !== null) g.notes = n; });

  // Ordre (classement) sauvegardé, sinon ordre du fichier
  order = null;
  try {
    const saved = JSON.parse(SAFE.get(ORDER_KEY) || 'null');
    if (Array.isArray(saved) && saved.length === gmfs.length &&
        saved.every(id => gmfs.some(g => g.id === id))) {
      order = saved;
    }
  } catch(e) {}
  if (!order) order = gmfs.map(g => g.id);

  buildMarkers();
  renderSidebar();
  showUpdateDate();
}

fetch('./data.json', { cache: 'no-cache' })
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(initData)
  .catch(err => {
    console.error('Chargement de data.json impossible :', err);
    const el = document.getElementById('maj-date');
    if (el) el.textContent = '\u26a0 Données indisponibles (vérifiez data.json)';
  });
</script>


<div class="ios-tip" id="ios-tip">
  <span id="ios-tip-msg"></span>
  <span id="ios-tip-close" style="margin-left:10px;cursor:pointer;text-decoration:underline;white-space:nowrap;">Fermer</span>
</div>

<script>
// Bouton d'installation visible (PWA)
(function () {
  var btn = document.getElementById('btn-install');
  var tip = document.getElementById('ios-tip');
  var tipMsg = document.getElementById('ios-tip-msg');
  var tipClose = document.getElementById('ios-tip-close');
  var deferred = null;

  var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  if (standalone) { return; } // déjà installée : on n'affiche rien

  function showTip(msg) { tipMsg.innerHTML = msg; tip.classList.add('show'); }
  if (tipClose) tipClose.addEventListener('click', function () { tip.classList.remove('show'); });

  // Android / Chrome / Edge : on capte l'invite native du navigateur
  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    deferred = e;
    btn.classList.add('show');
  });

  // iPhone / iPad : pas d'invite native, on montre quand même le bouton
  if (isIOS) btn.classList.add('show');

  btn.addEventListener('click', async function () {
    if (deferred) {
      deferred.prompt();
      try { await deferred.userChoice; } catch (e) {}
      deferred = null;
      btn.classList.remove('show');
    } else if (isIOS) {
      showTip("Pour installer\u00a0: touchez le bouton <b>Partager</b> \u2b06\ufe0f en bas de Safari, puis <b>\u00ab Sur l\u2019\u00e9cran d\u2019accueil \u00bb</b>.");
    } else {
      showTip("Pour installer\u00a0: ouvrez le menu de votre navigateur (\u22ee) puis choisissez <b>\u00ab Installer l\u2019application \u00bb</b>.");
    }
  });

  window.addEventListener('appinstalled', function () {
    btn.classList.remove('show');
    tip.classList.remove('show');
  });
})();
</script>

<script>
// Enregistrement du service worker (mode hors-ligne + installable)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
